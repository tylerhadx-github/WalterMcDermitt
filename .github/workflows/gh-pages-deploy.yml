name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy website
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        run: npm run build

      - name: Publish build to repository root
        run: |
          rm -rf static
          cp -r website/dist/. .

      - name: Commit and push site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets images favicon.svg icons.svg google24462e06dd67c953.html
          git add -u static || true
          if git diff --staged --quiet; then
            echo "No site changes to publish"
          else
            git commit -m "deploy: publish site to GitHub Pages [skip ci]"
            git push
          fi
